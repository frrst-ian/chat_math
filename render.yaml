services:
  - type: web
    name: chat-math-backend
    runtime: python
    region: singapore
    plan: starter
    rootDir: backend
    buildCommand: |
      apt-get update && apt-get install -y \
        ffmpeg \
        libcairo2-dev \
        libpango1.0-dev \
        texlive \
        texlive-latex-extra \
        texlive-fonts-extra \
        dvipng \
        && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_MODEL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false